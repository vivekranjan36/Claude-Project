name: Claude Code

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request_review:
    types: [submitted]

jobs:
  claude:
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude')) ||
      (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')))
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read # Required for Claude to read CI results on PRs
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Project Setup
        run: |
          npm run setup
          npm run dev:daemon

      - name: Write MCP config
        run: |
          cat > /tmp/mcp-config.json <<'JSON'
          {
            "mcpServers": {
              "playwright": {
                "command": "npx",
                "args": [
                  "@playwright/mcp@latest",
                  "--allowed-origins",
                  "localhost:3000;cdn.tailwindcss.com;esm.sh"
                ]
              }
            }
          }
          JSON

      - name: Run Claude Code
        id: claude
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}

          # custom_instructions and mcp_config are not real inputs of this
          # action (see action.yml's `inputs:` list) — GitHub silently drops
          # unknown `with:` keys with a warning instead of failing the build.
          # The actual mechanism is passing flags straight to the Claude CLI
          # via claude_args: --system-prompt for extra context, --mcp-config
          # (a file path or JSON string) to register MCP servers, and
          # --allowedTools to grant permission to use that server's tools.
          claude_args: |
            --mcp-config /tmp/mcp-config.json
            --allowedTools "mcp__playwright"
            --system-prompt "The project is already set up with all dependencies installed. The server is already running at localhost:3000. Logs from it are being written to logs.txt. If needed, you can query the db with the 'sqlite3' cli. If needed, use the mcp__playwright set of tools to launch a browser and interact with the app."
